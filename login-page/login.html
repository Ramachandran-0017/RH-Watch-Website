<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script
      src="https://kit.fontawesome.com/c54f248231.js"
      crossorigin="anonymous"
    ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — RH Multi Watch</title>
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <div class="auth-page">
      <!-- LEFT: brand panel with a live analog clock as the signature element -->
      <div class="auth-brand-panel">
        <a href="../index.html" class="auth-logo">
          <img src="../omega-logo.png" alt="RH Multi Watch" />
        </a>

        <div class="auth-clock-wrap">
          <svg
            class="auth-clock"
            viewBox="0 0 240 240"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle class="clock-face" cx="120" cy="120" r="110" />
            <!-- hour ticks -->
            <g class="clock-ticks" id="clockTicks"></g>
            <line
              id="hourHand"
              class="hand hour-hand"
              x1="120"
              y1="120"
              x2="120"
              y2="72"
            />
            <line
              id="minuteHand"
              class="hand minute-hand"
              x1="120"
              y1="120"
              x2="120"
              y2="50"
            />
            <line
              id="secondHand"
              class="hand second-hand"
              x1="120"
              y1="134"
              x2="120"
              y2="42"
            />
            <circle class="clock-pin" cx="120" cy="120" r="4" />
          </svg>
        </div>

        <div class="auth-brand-copy">
          <p class="cart-eyebrow">Est. Precision</p>
          <h1>Every second,<br />intentionally kept.</h1>
          <p class="auth-brand-sub">
            Sign in to track your orders, save pieces to your wishlist, and
            checkout faster next time.
          </p>
        </div>
      </div>

      <!-- RIGHT: auth card -->
      <div class="auth-form-panel">
        <div class="auth-card">
          <div class="auth-tabs">
            <button class="auth-tab is-active" data-tab="signin">
              Sign In
            </button>
            <button class="auth-tab" data-tab="signup">Create Account</button>
            <span class="auth-tab-indicator"></span>
          </div>

          <!-- SIGN IN FORM -->
          <form class="auth-form is-active" id="signinForm" novalidate>
            <div class="field-group">
              <label for="signinEmail">Email</label>
              <input
                type="email"
                id="signinEmail"
                placeholder="you@example.com"
                autocomplete="email"
              />
              <span class="field-error" id="signinEmailError"></span>
            </div>

            <div class="field-group">
              <label for="signinPassword">Password</label>
              <div class="password-wrap">
                <input
                  type="password"
                  id="signinPassword"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  data-target="signinPassword"
                  aria-label="Show password"
                >
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
              <span class="field-error" id="signinPasswordError"></span>
            </div>

            <div class="field-row">
              <label class="remember-me">
                <input type="checkbox" id="rememberMe" />
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="auth-submit">
              <span>Sign In</span>
              <i class="fa-solid fa-arrow-right"></i>
            </button>

            <p class="form-note" id="signinNote"></p>
          </form>

          <!-- SIGN UP FORM -->
          <form class="auth-form" id="signupForm" novalidate>
            <div class="field-group">
              <label for="signupName">Full name</label>
              <input
                type="text"
                id="signupName"
                placeholder="Your name"
                autocomplete="name"
              />
              <span class="field-error" id="signupNameError"></span>
            </div>

            <div class="field-group">
              <label for="signupEmail">Email</label>
              <input
                type="email"
                id="signupEmail"
                placeholder="you@example.com"
                autocomplete="email"
              />
              <span class="field-error" id="signupEmailError"></span>
            </div>

            <div class="field-group">
              <label for="signupPassword">Password</label>
              <div class="password-wrap">
                <input
                  type="password"
                  id="signupPassword"
                  placeholder="At least 8 characters"
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  data-target="signupPassword"
                  aria-label="Show password"
                >
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
              <div class="password-strength" id="passwordStrength">
                <span></span><span></span><span></span>
              </div>
              <span class="field-error" id="signupPasswordError"></span>
            </div>

            <label class="remember-me terms-check">
              <input type="checkbox" id="agreeTerms" />
              <span>I agree to the Terms of Use and Privacy Policy</span>
            </label>
            <span class="field-error" id="agreeTermsError"></span>

            <button type="submit" class="auth-submit">
              <span>Create Account</span>
              <i class="fa-solid fa-arrow-right"></i>
            </button>

            <p class="form-note" id="signupNote"></p>
          </form>

          <div class="auth-divider"><span>or continue with</span></div>

          <div class="social-row">
            <button type="button" class="social-btn">
              <i class="fa-brands fa-google"></i> Google
            </button>
            <button type="button" class="social-btn">
              <i class="fa-brands fa-apple"></i> Apple
            </button>
          </div>
        </div>

        <a href="../index.html" class="back-to-shop auth-back">
          <span class="back-arrow">←</span> Back to shop
        </a>
      </div>
    </div>

    <script src="./login.js"></script>
  </body>
</html>
